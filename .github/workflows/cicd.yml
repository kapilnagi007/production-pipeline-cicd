  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: .
          severity: CRITICAL

  docker-build-push:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build Docker image
        run: |
          docker build -t kopilnagi/react-procution-app:latest ./demo-app

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: kopilnagi/react-procution-app:latest
          formate: table
          exit-code: 1
          severity: CRITICAL
      
      - name: Push Docker image
        run: |
          docker push kopilnagi/react-procution-app:latest

  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region ap-south-1 \
          --name production-server

      - name: Verify IAM User
        run: aws sts get-caller-identity

      - name: Refresh EKS Token
        run: |
          aws eks get-token  --cluster-name production-server --region ap-south-1
      
      - name: Test Kubernetes Access
        run: |
          kubectl config current-context
          kubectl get node

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f demo-app/k8s/deployment.yml
          kubectl apply -f demo-app/k8s/service.yml



